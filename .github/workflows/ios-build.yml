name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS .ipa
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Disable Git credential helper for anonymous public clones
        # actions/checkout configures a credential helper that injects
        # GITHUB_TOKEN for github.com URLs, which breaks anonymous clones
        # of third-party public repos (e.g. Midtrans specs).
        run: git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Pre-clone Midtrans CocoaPods specs repo
        # The midtrans_sdk plugin requires MidtransKit, which lives in a
        # private spec repo. Clone it directly into the CocoaPods repos
        # directory so `pod install` (run by flutter build) finds it locally
        # instead of trying to clone it itself (which fails in CI).
        run: |
          set -e
          mkdir -p ~/.cocoapods/repos
          if [ ! -d ~/.cocoapods/repos/midtrans-midtrans-cocoapods-specs ]; then
            git clone --depth=1 https://github.com/Midtrans/midtrans-cocoapods-specs.git \
              ~/.cocoapods/repos/midtrans-midtrans-cocoapods-specs
          fi
          # Also pre-warm the trunk CDN cache
          pod repo update || true

      - name: Build iOS (no codesign)
        # `flutter build ios` runs `pod install` internally with the correct
        # working directory (ios/), so we do NOT run pod install separately.
        run: flutter build ios --release --no-codesign

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qq -r app-unsigned.ipa Payload
          ls -lh app-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: build/ios/ipa/app-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
