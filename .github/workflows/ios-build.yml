name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS .ipa
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Do not persist the GITHUB_TOKEN-based credential helper globally;
          # it breaks anonymous clones of unrelated public github.com repos
          # (e.g. the Midtrans CocoaPods specs repo) inside CocoaPods.
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Remove midtrans_sdk from pubspec for iOS CI build
        # The midtrans_sdk plugin has an unfixable iOS build problem: it pins
        # MidtransKit 1.28.0 (missing from trunk) and declares iOS 8.0 while
        # MidtransKit requires 9.0+. We strip it from pubspec.yaml ONLY in CI
        # so the iOS .ipa can build. The Dart code does not import the plugin
        # (confirmed: only static "midtrans" string references for our own
        # backend API exist), so this is safe.
        # The pubspec.yaml in the repo is unchanged; only the runner's copy
        # is modified for this build.
        run: |
          set -e
          echo "-- Stripping midtrans_sdk line from pubspec.yaml --"
          # Remove the line that begins with `  midtrans_sdk:` (allowing any version pin)
          sed -i.bak '/^[[:space:]]*midtrans_sdk:/d' pubspec.yaml
          echo "-- pubspec.yaml dependencies section after strip --"
          sed -n '/^dependencies:/,/^[^[:space:]]/p' pubspec.yaml
          echo "-- Regenerating pubspec.lock --"
          rm -f pubspec.lock
          flutter pub get

      - name: Build iOS (no codesign)
        # `flutter build ios` runs `pod install` internally with the correct
        # working directory (ios/), so we do NOT run pod install separately.
        run: flutter build ios --release --no-codesign

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qq -r app-unsigned.ipa Payload
          ls -lh app-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: build/ios/ipa/app-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
