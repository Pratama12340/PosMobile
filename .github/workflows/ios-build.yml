name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS .ipa
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Update CocoaPods specs repos
        # Pre-warms specs (incl. Midtrans private repo declared in ios/Podfile)
        # so the pod install triggered by `flutter build ios` finds MidtransKit.
        run: pod repo update

      - name: Build iOS (no codesign)
        # `flutter build ios` runs `pod install` internally with the correct
        # working directory (ios/), so we do NOT run pod install separately.
        run: flutter build ios --release --no-codesign

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qq -r app-unsigned.ipa Payload
          ls -lh app-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: build/ios/ipa/app-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
