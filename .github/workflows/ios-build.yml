name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS .ipa
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Do not persist the GITHUB_TOKEN-based credential helper globally;
          # it breaks anonymous clones of unrelated public github.com repos
          # (e.g. the Midtrans CocoaPods specs repo) inside CocoaPods.
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patch midtrans_sdk podspec iOS deployment target
        # midtrans_sdk 1.2.0 declares iOS 8.0 in its podspec via
        # `s.platform = :ios, '8.0'`, but its MidtransKit dependency requires
        # iOS 9.0+. Flutter's pre-build check rejects this mismatch. Rewrite
        # the plugin's podspec in the local pub cache to declare iOS 13.0.
        run: |
          set -e
          PLUGIN_PODSPEC=$(find "$PUB_CACHE/hosted" -path '*midtrans_sdk*/ios/midtrans_sdk.podspec' | head -n1)
          if [ -z "$PLUGIN_PODSPEC" ]; then
            echo "midtrans_sdk podspec not found in pub cache"
            find "$PUB_CACHE/hosted" -name 'midtrans_sdk.podspec' || true
            exit 1
          fi
          echo "Patching: $PLUGIN_PODSPEC"
          echo "----- Before patch -----"
          cat "$PLUGIN_PODSPEC"
          echo "------------------------"
          # Handle both `s.platform = :ios, '8.0'` and `s.ios.deployment_target = '8.0'`
          sed -i.bak -E "s/s\.platform[[:space:]]*=[[:space:]]*:ios,[[:space:]]*'[0-9.]+'/s.platform = :ios, '13.0'/" "$PLUGIN_PODSPEC"
          sed -i.bak -E "s/s\.ios\.deployment_target[[:space:]]*=[[:space:]]*'[0-9.]+'/s.ios.deployment_target = '13.0'/" "$PLUGIN_PODSPEC"
          echo "----- After patch -----"
          cat "$PLUGIN_PODSPEC"
          echo "-----------------------"

      - name: Build iOS (no codesign)
        # `flutter build ios` runs `pod install` internally with the correct
        # working directory (ios/), so we do NOT run pod install separately.
        run: flutter build ios --release --no-codesign

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qq -r app-unsigned.ipa Payload
          ls -lh app-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: build/ios/ipa/app-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
