name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS .ipa
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Do not persist the GITHUB_TOKEN-based credential helper globally;
          # it breaks anonymous clones of unrelated public github.com repos
          # (e.g. the Midtrans CocoaPods specs repo) inside CocoaPods.
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Pre-clone Midtrans CocoaPods specs repo
        # The midtrans_sdk plugin requires MidtransKit, hosted in a separate
        # public spec repo. We clone it directly into ~/.cocoapods/repos/ so
        # `pod install` (triggered by `flutter build ios`) finds it locally
        # and does NOT try to clone it itself — that internal clone runs with
        # CocoaPods' own git env where auth handling is fragile.
        env:
          # Force an empty credential helper for this step so Git will not
          # try to prompt for username/password when cloning public repos.
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -e
          # Clear any inherited auth header / credential helper for github.com
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global credential.helper "" || true
          mkdir -p ~/.cocoapods/repos
          if [ ! -d ~/.cocoapods/repos/midtrans-midtrans-cocoapods-specs ]; then
            git -c credential.helper= -c http.https://github.com/.extraheader= \
                clone --depth=1 \
                https://github.com/Midtrans/midtrans-cocoapods-specs.git \
                ~/.cocoapods/repos/midtrans-midtrans-cocoapods-specs
          fi
          # Pre-warm the trunk CDN cache (non-fatal if it fails)
          pod repo update || true

      - name: Build iOS (no codesign)
        # `flutter build ios` runs `pod install` internally with the correct
        # working directory (ios/), so we do NOT run pod install separately.
        run: flutter build ios --release --no-codesign

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qq -r app-unsigned.ipa Payload
          ls -lh app-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: build/ios/ipa/app-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
